<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharacterMaker - 3D Character Creator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- How to run: Open this file in a modern web browser (Chrome, Firefox, Safari, Edge). -->
    
    <div id="app">
        <!-- Character Creator Screen -->
        <div id="creatorScreen" class="screen active">
            <div class="creator-container">
                <h1>✨ CharacterMaker 3D ✨</h1>
                <div class="creator-layout">
                    <!-- 3D Preview Canvas -->
                    <div class="preview-section">
                        <h2>Preview</h2>
                        <div id="canvas-container"></div>
                        <div class="preview-controls">
                            <p>Drag to rotate • Scroll to zoom • Middle-click to pan</p>
                        </div>
                        <div class="action-buttons">
                            <button id="saveCharBtn" class="btn-primary">Save Character</button>
                            <button id="randomBtn" class="btn-secondary">Random</button>
                            <button id="resetBtn" class="btn-secondary">Reset</button>
                        </div>
                    </div>

                    <!-- Customization Options -->
                    <div class="options-section">
                        <h2>Customize</h2>
                        <div class="tabs">
                            <button class="tab-btn active" data-tab="appearance">Appearance</button>
                            <button class="tab-btn" data-tab="saved">Saved Characters</button>
                        </div>

                        <!-- Appearance Tab -->
                        <div id="appearance" class="tab-content active">
                            <div class="option-group">
                                <label>Skin Tone</label>
                                <select id="skinTone">
                                    <option value="#f4cdb4">Fair</option>
                                    <option value="#e8b89c">Light</option>
                                    <option value="#d4a574">Medium</option>
                                    <option value="#c9935a">Olive</option>
                                    <option value="#a0826d">Tan</option>
                                    <option value="#8b6f47">Brown</option>
                                    <option value="#6b5344" selected>Deep</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Head Shape</label>
                                <select id="headShape">
                                    <option value="round" selected>Round</option>
                                    <option value="oval">Oval</option>
                                    <option value="square">Square</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Eye Style</label>
                                <select id="eyeStyle">
                                    <option value="round" selected>Round</option>
                                    <option value="almond">Almond</option>
                                    <option value="droopy">Droopy</option>
                                    <option value="wide">Wide</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Eye Color</label>
                                <select id="eyeColor">
                                    <option value="#4a4a4a" selected>Black</option>
                                    <option value="#6b4423">Brown</option>
                                    <option value="#4169e1">Blue</option>
                                    <option value="#228b22">Green</option>
                                    <option value="#8b4513">Dark Brown</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Nose Shape</label>
                                <select id="noseShape">
                                    <option value="small" selected>Small</option>
                                    <option value="large">Large</option>
                                    <option value="pointed">Pointed</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Mouth</label>
                                <select id="mouthStyle">
                                    <option value="smile" selected>Smile</option>
                                    <option value="neutral">Neutral</option>
                                    <option value="sad">Sad</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Hair Style</label>
                                <select id="hairStyle">
                                    <option value="short" selected>Short</option>
                                    <option value="long">Long</option>
                                    <option value="curly">Curly</option>
                                    <option value="spiky">Spiky</option>
                                    <option value="wavy">Wavy</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Hair Color</label>
                                <select id="hairColor">
                                    <option value="#2c2416" selected>Black</option>
                                    <option value="#4a3c2a">Dark Brown</option>
                                    <option value="#8b6f47">Brown</option>
                                    <option value="#d4a574">Light Brown</option>
                                    <option value="#ffd700">Blonde</option>
                                    <option value="#dc143c">Red</option>
                                    <option value="#8b4789">Purple</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Eyebrows</label>
                                <select id="eyebrowStyle">
                                    <option value="normal" selected>Normal</option>
                                    <option value="thick">Thick</option>
                                    <option value="thin">Thin</option>
                                    <option value="angry">Angry</option>
                                </select>
                            </div>

                            <div class="option-group">
                                <label>Character Name</label>
                                <input type="text" id="charName" placeholder="Enter name..." maxlength="20" value="MyChar">
                            </div>
                        </div>

                        <!-- Saved Characters Tab -->
                        <div id="saved" class="tab-content">
                            <div class="saved-characters" id="savedCharactersList">
                                <p class="empty-message">No saved characters yet</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for saving character -->
    <div id="saveModal" class="modal hidden">
        <div class="modal-content">
            <h2>Save Character</h2>
            <input type="text" id="saveName" placeholder="Enter character name" maxlength="20">
            <div class="modal-buttons">
                <button id="confirmSaveBtn" class="btn-primary">Save</button>
                <button id="cancelSaveBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
